name: docker-build-push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        # Uses GitHub Secrets to authenticate with Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Only push if it is a direct push to main branch (not PRs)
          push: ${{ github.event_name != 'pull_request' }}
          # Create tag with repository username / app name
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/chinese-grammar-tutor:latest
          # Optimize builds with GitHub Actions Cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
