name: docker-build-push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: self-hosted
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/chinese-grammar-tutor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: deploy to local Linux Server
        if: github.event_name != 'pull_request'
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/chinese-grammar-tutor:latest
          docker stop chinese-tutor-api || true
          docker rm chinese-tutor-api || true
          docker run -d \
            -p 8000:8000 \
            --name chinese-tutor-api \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/chinese-grammar-tutor:latest
