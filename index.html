<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT-style AI Tutor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #343541; color: #d1d5db; }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 260px; background-color: #202123; padding: 8px; display: flex; flex-direction: column; }
        .new-chat-btn { border: 1px solid #4d4d4f; background: transparent; color: white; padding: 12px; border-radius: 6px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; transition: 0.2s; }
        .new-chat-btn:hover { background-color: #2A2B32; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        .messages { flex: 1; overflow-y: auto; padding-bottom: 140px; }
        .message-row { display: flex; padding: 24px; justify-content: center; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .bot { background-color: #444654; }
        .msg-content { max-width: 768px; width: 100%; display: flex; gap: 24px; line-height: 1.7; font-size: 15px; }
        .avatar { width: 30px; height: 30px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; }
        .avatar-user { background-color: #10a37f; }
        .avatar-bot { background-color: #10a37f; }
        .input-area { position: absolute; bottom: 0; width: 100%; display: flex; justify-content: center; background: linear-gradient(180deg, rgba(53,55,64,0), #343541 40%); padding: 30px 0; }
        .input-box { width: 100%; max-width: 768px; position: relative; background-color: #40414f; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .input-wrapper { display: flex; padding: 4px; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 14px; font-size: 1rem; outline: none; }
        .input-wrapper button { background: transparent; border: none; color: #8e8ea0; padding: 10px 15px; cursor: pointer; transition: 0.3s; margin-right: 4px; border-radius: 6px; }
        .input-wrapper button:hover { background: #10a37f; color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <button class="new-chat-btn" onclick="clearChat()"><i class="fas fa-plus"></i> 새 대화하기</button>
        </div>
        <div class="chat-area">
            <div class="messages" id="chatBox">
                <div class="message-row bot">
                    <div class="msg-content">
                        <div class="avatar avatar-bot"><i class="fas fa-bolt"></i></div>
                        <div>안녕하세요! MLOps 지식 확장 업데이트가 적용된 중국어 문법 튜터입니다. 질문해 주시면 관련된 심화 문법까지 이어서 알려드립니다.</div>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-box">
                    <div class="input-wrapper">
                        <input type="text" id="userInput" placeholder="질문을 입력하세요..." onkeypress="handleEnter(event)">
                        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        function clearChat() {
            /* simplified reset */
            location.reload(); 
        }

        function createMessageElement(text, isUser) {
            const row = document.createElement('div');
            row.className = 'message-row' + (isUser ? '' : ' bot');
            
            // basic line jump to handle LLM newlines correctly
            row.innerHTML = `
                <div class="msg-content">
                    <div class="avatar ${isUser ? 'avatar-user' : 'avatar-bot'}"><i class="fas ${isUser ? 'fa-user' : 'fa-robot'}"></i></div>
                    <div>${text.replace(/\n/g, '<br>')}</div>
                </div>
            `;
            return row;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if(!text) return;
            
            chatBox.appendChild(createMessageElement(text, true));
            userInput.value = '';
            
            const loadingRow = document.createElement('div');
            loadingRow.className = 'message-row bot loading-indicator';
            loadingRow.innerHTML = '<div class="msg-content"><div class="avatar avatar-bot"><i class="fas fa-spinner fa-spin"></i></div><div>지식을 분석하고 심화 확장 중입니다...</div></div>';
            chatBox.appendChild(loadingRow);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                chatBox.removeChild(loadingRow);
                
                if(response.ok) {
                    chatBox.appendChild(createMessageElement(data.reply, false));
                } else {
                    chatBox.appendChild(createMessageElement("Error: " + data.detail, false));
                }
            } catch(e) {
                chatBox.removeChild(loadingRow);
                chatBox.appendChild(createMessageElement("서버 문제 발생", false));
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleEnter(e) {
            if(e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
